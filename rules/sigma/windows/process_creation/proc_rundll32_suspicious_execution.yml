title: Suspicious Rundll32 Execution
id: ac9f4594-5bc0-494d-b81f-fb0b2e9b0777
status: experimental
description: Detects rundll32.exe executing suspicious script, URL, or JavaScript-related patterns often associated with proxy execution.
references:
  - https://attack.mitre.org/techniques/T1218/011/
author: Matt Caballero
date: 2026-07-09
modified: 2026-07-09
tags:
  - attack.defense_evasion
  - attack.t1218.011
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith: '\\rundll32.exe'
  selection_suspicious:
    CommandLine|contains:
      - 'javascript:'
      - 'mshtml,'
      - 'RunHTMLApplication'
      - 'http://'
      - 'https://'
      - '.sct'
      - 'scrobj.dll'
  condition: selection_image and selection_suspicious
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
falsepositives:
  - Rare legacy administrative scripts or vendor software using rundll32 with unusual arguments.
level: high
