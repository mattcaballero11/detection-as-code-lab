title: Suspicious PowerShell Encoded Command
id: 3d4f0c3b-4ad1-4d21-9d1b-8d59ff3a8f10
status: experimental
description: Detects PowerShell execution using encoded command parameters commonly used to obfuscate command-line activity.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Matt Caballero
date: 2026-07-09
modified: 2026-07-09
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - '\\powershell.exe'
      - '\\pwsh.exe'
  selection_command:
    CommandLine|contains:
      - ' -enc '
      - ' -encodedcommand '
      - ' -e '
      - '/enc '
      - '/encodedcommand '
  condition: selection_image and selection_command
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
falsepositives:
  - Administrative automation or software deployment scripts using encoded PowerShell commands.
level: medium
